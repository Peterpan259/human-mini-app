<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Proof of Human</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Required dependencies for ShareRing SDK QR rendering -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.qrcode/1.0/jquery.qrcode.min.js"></script>
    
    <!-- ShareRing SDK -->
    <script src="https://raw.githack.com/ShareRing/shareringlink-javascript-library/master/sharering.query.lib.prod.min.js"></script>
    
    <style>
        body {font-family: system-ui, -apple-system, sans-serif; background:#0f0f0f; color:#fff; text-align:center; padding:40px 20px; margin:0;}
        #status {margin:30px 0; font-size:18px; color:#aaa; line-height: 1.5;}
        #qrcode {margin:20px auto; max-width:300px; min-height:300px; background:#fff; padding:10px; border-radius:12px;}
        #qrcode canvas { max-width: 100%; height: auto !important; }
        .error {color:#ff5555; font-weight:bold;}
        .warning {color:#ffaa00;}
    </style>
</head>
<body>
    <h1>Prove You Are Human</h1>
    <p>Scan with <b>ShareRing Me</b> app.<br>Biometric check — privacy-first.</p>
    
    <div class="sharering-query"
         queryId="69964833c65d9f316f5ea3dd,basic"
         mode="basic"
         qrcodeOwner="shareledger16ac92ru7rhdn2ruxur4a7cyszexha39dr6re39"
         app="ShareRing Me"
         oninit="onInit"
         onscan="onScan">
        <div id="qrcode"></div>
    </div>

    <div id="status">Loading QR code...</div>

    <script>
        var $ = jQuery;
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const urlParams = new URLSearchParams(location.search);
        const chatId = urlParams.get('chat_id') || 'unknown';

        // Required by the SDK to update the UI when the QR is ready
        function onInit(data) {
            console.log('ShareRing SDK init success:', data);
            document.getElementById('status').innerHTML = '✅ QR ready — scan with ShareRing Me';
        }

        function onScan(data) {
            console.log('Scan result received:', data);
            document.getElementById('status').innerHTML = '✅ Human verified!<br>Analysing data...';

            // Fixed URL to include /post
            fetch('https://httpbin.org/post', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    scanData: data,
                    chatId: chatId,
                    timestamp: new Date().toISOString()
                })
            })
            .then(response => {
                if (!response.ok) throw new Error('Network response was not ok');
                return response.json();
            })
            .then(result => {
                console.log('Analysis result from httpbin:', result);
                
                // Notify Telegram and close
                tg.sendData(JSON.stringify({
                    action: 'human_verified', 
                    chat_id: chatId,
                    httpbin_status: 'success' 
                }));
                
                document.getElementById('status').innerHTML = '✅ Analysis complete. Closing...';
                setTimeout(() => tg.close(), 1500);
            })
            .catch(err => {
                console.error('Error during analysis:', err);
                document.getElementById('status').innerHTML = '<span class="error">Analysis failed.</span>';
                
                // Fallback to ensure the user isn't stuck
                tg.sendData(JSON.stringify({action: 'human_verified', chat_id: chatId}));
                setTimeout(() => tg.close(), 2000);
            });
        }

        // Error catching
        window.addEventListener('error', (event) => {
            console.error('JS error:', event.message);
            if (event.message.toLowerCase().includes('sharering') || event.message.includes('$')) {
                document.getElementById('status').innerHTML = '<span class="error">QR failed to load. Please refresh.</span>';
            }
        });

        // Watchdog for empty QR
        setTimeout(() => {
            const qrDiv = document.getElementById('qrcode');
            if (qrDiv.innerHTML.trim() === '') {
                document.getElementById('status').innerHTML = '<span class="warning">QR taking a while... check your internet or Dashboard queryId.</span>';
            }
        }, 8000);
    </script>
</body>
</html>

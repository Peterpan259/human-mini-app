<!DOCTYPE html>
<html lang="en">
<head>
    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Proof of Human</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Required dependencies for ShareRing SDK QR rendering -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.qrcode/1.0/jquery.qrcode.min.js"></script>
    
    <script src="https://raw.githack.com/ShareRing/shareringlink-javascript-library/master/sharering.query.lib.prod.min.js"></script>
    
    <style>
        body {font-family: system-ui; background:#0f0f0f; color:#fff; text-align:center; padding:40px 20px; margin:0;}
        #status {margin:30px 0; font-size:18px; color:#aaa;}
        #qrcode {margin:20px auto; max-width:300px; min-height:300px; background:#fff; padding:10px; border-radius:12px;}
        .error {color:#ff5555; font-weight:bold;}
        .warning {color:#ffaa00;}
    </style>
</head>
<body>
    <h1>Prove You Are Human</h1>
    <p>Scan with <b>ShareRing Me</b> app.<br>Biometric check — privacy-first.</p>
    
    <div class="sharering-query"
         queryId="69964833c65d9f316f5ea3dd"
         mode="basic"
         qrcodeOwner="shareledger16ac92ru7rhdn2ruxur4a7cyszexha39dr6re39"
         app="ShareRing Me"
         oninit="onInit"
         onscan="onScan">
        <div id="qrcode"></div>  <!-- QR will appear here -->
    </div>

    <div id="status">Loading QR code...</div>

    <script>
        // Fix jQuery noConflict if needed (helps in some environments)
        var $ = jQuery;

        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const urlParams = new URLSearchParams(location.search);
        const chatId = urlParams.get('chat_id') || 'unknown';

        function onInit(data) {
            console.log('ShareRing SDK init success:', data);
            document.getElementById('status').textContent = '✅ QR ready — scan with ShareRing Me';
        }

        function onScan(data) {
            console.log('Scan result:', data);
            // Any successful scan = human proof on free tier
            document.getElementById('status').innerHTML = '✅ Human verified!<br>Approving join...';
            tg.sendData(JSON.stringify({action: 'human_verified', chat_id: chatId}));
            setTimeout(() => tg.close(), 1500);
        }

        // Error catching + empty check
        window.addEventListener('error', (event) => {
            console.error('JS error:', event.message, event.filename, event.lineno);
            if (event.message.toLowerCase().includes('sharering') || event.message.includes('$') || event.message.includes('qrcode')) {
                document.getElementById('status').innerHTML = '<span class="error">QR failed — likely missing deps or bad config. Check console.</span>';
            }
        });

        setTimeout(() => {
            const qrDiv = document.getElementById('qrcode');
            if (qrDiv.innerHTML.trim() === '' || qrDiv.innerHTML.includes('Loading')) {
                document.getElementById('status').innerHTML += '<br><span class="warning">QR empty — check queryId/Owner or dashboard config.</span>';
            }
        }, 8000);  // Longer timeout for safety
    </script>
</body>
</html>

<body>
    <h1>Prove You Are Human</h1>

    <div class="sharering-query"

         app="ShareRing Me"
         oninit="onInit"
         onscan="onScan">
        <div id="qrcode"></div>  <!-- Explicit container for QR -->
    </div>

    <div id="status">Loading QR code...</div>

    <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const urlParams = new URLSearchParams(location.search);
    const chatId = urlParams.get('chat_id') || 'unknown';

    function onInit(data) {
        console.log('ShareRing SDK initialized:', data);
        document.getElementById('status').textContent = 'QR ready — scan with ShareRing Me app';

    function onScan(data) {

        tg.sendData(JSON.stringify({action: 'human_verified', chat_id: chatId}));
        setTimeout(() => tg.close(), 1500);
    }

    // Debug: Catch any SDK errors and show them on screen
    window.addEventListener('error', (event) => {
        console.error('Global error:', event.message, event.filename, event.lineno);
        if (event.message.includes('sharering') || event.message.includes('qrcode')) {
            document.getElementById('status').innerHTML = 
                '<span style="color:red;">QR failed to load — check console or query config.</span>';
        }
    });

    // Check after a few seconds if QR div is still empty
    setTimeout(() => {
        if (document.getElementById('qrcode').innerHTML.trim() === '') {
            document.getElementById('status').innerHTML += 
                '<br><span style="color:orange;">QR container empty — SDK init may have failed.</span>';
        }
    }, 5000);
</script>
